version: '3.8'
services:
  api:
    build: .
    ports:
      - "7001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - ./data:/app/data

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "7002:8080"
    environment:
      - ApiBaseUrl=http://api:8080
    depends_on:
      - api
