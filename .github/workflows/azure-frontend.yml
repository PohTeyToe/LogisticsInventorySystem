name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - "src/logistics-dashboard/**"
      - ".github/workflows/azure-frontend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-frontend
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/logistics-dashboard/package-lock.json

      - run: npm ci
        working-directory: src/logistics-dashboard

      - run: npm run build
        working-directory: src/logistics-dashboard
        env:
          VITE_API_URL: https://logistics-inventory-api-abdallah.azurewebsites.net

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: src/logistics-dashboard/dist
